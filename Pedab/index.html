        function getText(key) {
            const lang = (currentUser && currentUser.lang) ? currentUser.lang : "English";
            return I18N[lang] && I18N[lang][key] ? I18N[lang][key] : (I18N["English"][key] || key);
        }

        function applyLanguageAndTheme() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = getText(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = getText(el.getAttribute('data-i18n-ph')); });
            if (currentUser && currentUser.theme === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
        }

        function showToast(text, type = 'green') {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.className = `toast ${type}`; toast.innerText = text; container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- 3. ГЛОБАЛЬНА БАЗА ДАНИХ ТА СТАТУСИ ---
        let db = { users: {}, nicks: {}, channels: {}, messages: {} };
        let currentUser = null; let authMode = 'login'; let currentView = 'friends'; let activeChatId = null; let chatType = null; 
        let isDbLoaded = false; let myCallStatus = null;

        fdb.ref('pedab_global_db').on('value', (snapshot) => {
            if (snapshot.val()) {
                db = snapshot.val();
                if(!db.users) db.users = {}; if(!db.nicks) db.nicks = {}; if(!db.channels) db.channels = {}; if(!db.messages) db.messages = {};
            }
            if (!isDbLoaded) {
                isDbLoaded = true; document.getElementById('loading-screen').style.display = 'none';
                if (!currentUser) document.getElementById('auth-screen').style.display = 'flex';
            }
            refreshUI();
        });

        function saveDB() { fdb.ref('pedab_global_db').set(db); }

        function refreshUI() {
            if (!currentUser) { applyLanguageAndTheme(); return; }
            if(!db.users[currentUser.id]) return; 
            
            if(!db.users[currentUser.id].channels) db.users[currentUser.id].channels = [];
            if(!db.users[currentUser.id].friends) db.users[currentUser.id].friends = [];
            if(!db.users[currentUser.id].requests) db.users[currentUser.id].requests = [];
            if(!db.users[currentUser.id].lang) db.users[currentUser.id].lang = "English";
            if(!db.users[currentUser.id].theme) db.users[currentUser.id].theme = "dark";
            
            currentUser = db.users[currentUser.id];
            applyLanguageAndTheme(); updateProfileSidebar();
            
            if (currentView === 'chat' && activeChatId) renderChatRoom(activeChatId, chatType);
            else setView(currentView);
        }

        // --- СИСТЕМА ОНЛАЙН / СМС / БОТ ---
        function setOnlineStatus() {
            const presenceRef = fdb.ref('status/' + currentUser.id);
            fdb.ref('.info/connected').on('value', snap => {
                if(snap.val() === true) { presenceRef.onDisconnect().set(false); presenceRef.set(true); }
            });
            // Слухаємо дзвінки для себе
            fdb.ref('calls/' + currentUser.id).on('value', snap => {
                const callInfo = snap.val();
                if (callInfo && callInfo.status === 'calling' && callInfo.from !== currentUser.id) {
                    document.getElementById('call-modal').style.display = 'flex';
                    document.getElementById('call-title').innerText = `Call from ${callInfo.from}...`;
                    document.getElementById('call-buttons').style.display = 'flex';
                    document.getElementById('active-call-controls').style.display = 'none';
                    document.getElementById('local-video-container').style.display = 'none';
                    myCallStatus = callInfo.from;
                } else if (!callInfo) {
                    stopLocalMedia();
                    document.getElementById('call-modal').style.display = 'none';
                    myCallStatus = null;
                }
            });
        }

        function sendBotMessage(targetId, textKeyOrRaw) {
            let roomId = getChatRoomId(targetId, 'pedab_bot');
            if(!db.messages[roomId]) db.messages[roomId] = [];
            db.messages[roomId].push({from: 'pedab_bot', text: textKeyOrRaw, type: 'bot'});
            saveDB();
        }

        // --- КЕРУВАННЯ МЕДІА (КАМЕРА ТА МІКРОФОН) ---
        let localStream = null;
        let isMicOn = true;
        let isCamOn = true;

        async function startLocalMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('local-video-container').style.display = 'block';
                isMicOn = true; isCamOn = true;
                document.getElementById('btn-mic').style.background = "#3a3a5a";
                document.getElementById('btn-cam').style.background = "#3a3a5a";
            } catch (e) {
                showToast("Немає доступу до камери/мікрофона", "yellow");
            }
        }

        function stopLocalMedia() {
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            document.getElementById('local-video-container').style.display = 'none';
        }

        function toggleMic() {
            if(localStream) {
                isMicOn = !isMicOn;
                localStream.getAudioTracks()[0].enabled = isMicOn;
                document.getElementById('btn-mic').style.background = isMicOn ? "#3a3a5a" : "#dc3545";
            }
        }

        function toggleCam() {
            if(localStream) {
                isCamOn = !isCamOn;
                localStream.getVideoTracks()[0].enabled = isCamOn;
                document.getElementById('btn-cam').style.background = isCamOn ? "#3a3a5a" : "#dc3545";
            }
        }

        // --- ДЗВІНКИ (Signaling) ---
        function startCall(targetId) {
            fdb.ref('status/' + targetId).once('value', snap => {
                if(!snap.val()) {
                    sendBotMessage(targetId, `${currentUser.id}: calling`);
                    showToast("Користувач офлайн. СМС надіслано.", "yellow");
                } else {
                    fdb.ref('calls/' + targetId).set({ from: currentUser.id, status: 'calling' });
                    document.getElementById('call-modal').style.display = 'flex';
                    document.getElementById('call-title').innerText = `Calling ${targetId}...`;
                    document.getElementById('call-buttons').style.display = 'none';
                    document.getElementById('active-call-controls').style.display = 'flex';
                    myCallStatus = targetId;
                    
                    startLocalMedia(); // Вмикаємо свою камеру

                    fdb.ref('calls/' + targetId).on('value', ansSnap => {
                        if(ansSnap.val() && ansSnap.val().status === 'accepted') {
                            document.getElementById('call-title').innerText = `In Call with ${targetId}`;
                        } else if (!ansSnap.val()) {
                            stopLocalMedia();
                            document.getElementById('call-modal').style.display = 'none';
                            myCallStatus = null;
                        }
                    });
                }
            });
        }

        function acceptCall() {
            if(myCallStatus) {
                fdb.ref('calls/' + currentUser.id).update({ status: 'accepted' });
                document.getElementById('call-title').innerText = `In Call with ${myCallStatus}`;
                document.getElementById('call-buttons').style.display = 'none';
                document.getElementById('active-call-controls').style.display = 'flex';
                startLocalMedia(); // Вмикаємо свою камеру при прийнятті
            }
        }

        function rejectCall() { fdb.ref('calls/' + currentUser.id).remove(); }
        function endCall() {
            if(myCallStatus) {
                fdb.ref('calls/' + myCallStatus).remove();
                fdb.ref('calls/' + currentUser.id).remove();
            }
            stopLocalMedia();
            document.getElementById('call-modal').style.display = 'none';
        }

        // --- АВТОРИЗАЦІЯ ---
        function setAuthMode(mode) {
            authMode = mode; document.getElementById('tab-login').classList.toggle('active', mode === 'login'); document.getElementById('tab-reg').classList.toggle('active', mode === 'reg'); document.getElementById('reg-fields').style.display = mode === 'reg' ? 'block' : 'none'; 
            document.getElementById('auth-btn').innerText = mode === 'reg' ? getText('REG_BTN') : getText('ENTER_BTN');
        }

        function handleAuth() {
            const nick = document.getElementById('auth-nick').value.trim(); const id = document.getElementById('auth-id').value.trim(); const pass = document.getElementById('auth-pass').value.trim();
            const lowerNick = nick.toLowerCase(); const lowerId = id.toLowerCase();
            
            if (lowerNick.includes("pedab") || lowerId.includes("pedab") || lowerNick.includes("👾") || lowerId.includes("👾")) {
                return showToast(getText('ERROR_RES'), "red");
            }

            if (authMode === 'reg') {
                if (!nick || !id || !pass) return showToast("Error", "red");
                if (db.nicks[nick]) return showToast("Error", "red");
                if (db.users[id]) return showToast("Error", "red");
                db.users[id] = { nick, pass, icon: "", friends: [], requests: [], channels: [], lang: "English", theme: "dark" }; 
                db.nicks[nick] = id; saveDB(); loginSuccess(id);
            } else {
                if (db.users[id] && db.users[id].pass === pass) loginSuccess(id); else showToast("Error", "red");
            }
        }

        function loginSuccess(id) {
            currentUser = db.users[id]; currentUser.id = id;
            if(!currentUser.channels) currentUser.channels = []; if(!currentUser.lang) currentUser.lang = "English";
            if(!currentUser.friends) currentUser.friends = []; if(!currentUser.requests) currentUser.requests = [];
            if(!currentUser.theme) currentUser.theme = "dark";
            
            document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'flex';
            setOnlineStatus(); applyLanguageAndTheme(); updateProfileSidebar(); setView('friends');
        }
        function logout() { location.reload(); }

        function getAvatarHTML(name, iconSrc, isFriend) {
            if(name === "pedab_bot") return `<div class="avatar bot-avatar">👾</div>`;
            const letter = name ? name.charAt(0).toUpperCase() : '?';
            if (iconSrc && iconSrc !== "") return `<img src="${iconSrc}" class="avatar" onerror="this.onerror=null; this.outerHTML='<div class=\\'avatar error-avatar\\'>?</div>'">`;
            return `<div class="avatar ${isFriend ? 'friend-avatar' : 'stranger-avatar'}">${letter}</div>`;
        }
        function updateProfileSidebar() {
            document.getElementById('my-nick-display').innerText = currentUser.nick; document.getElementById('my-id-display').innerText = "ID: " + currentUser.id;
            document.getElementById('my-avatar-slot').innerHTML = getAvatarHTML(currentUser.nick, currentUser.icon, true); document.getElementById('req-count').innerText = currentUser.requests.length;
        }

        // --- ЛОГІКА ВКЛАДОК ---
        function setView(view) {
            currentView = view; activeChatId = null; chatType = null;
            const content = document.getElementById('main-content'); const title = document.getElementById('view-title');
            document.getElementById('chat-input-box').style.display = 'none'; document.getElementById('emoji-picker').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            if (view === 'friends') {
                title.innerHTML = getText('NAV_FRIENDS');
                content.innerHTML = `<div class="user-row">${getAvatarHTML('pedab_bot', '', false)}<div>👾Pedab System Bot <br><small style="color:#888;">ID: pedab_bot</small></div><button class="action-btn" onclick="openChat('pedab_bot', 'friend')">${getText('WRITE')}</button></div>`;
                currentUser.friends.forEach(fId => { const friend = db.users[fId]; content.innerHTML += `<div class="user-row">${getAvatarHTML(friend.nick, friend.icon, true)}<div>${friend.nick} <br><small style="color:#888;">ID: ${fId}</small></div><button class="action-btn" onclick="openChat('${fId}', 'friend')">${getText('WRITE')}</button></div>`; });
            } 
            else if (view === 'requests') { 
                title.innerHTML = getText('NAV_REQUESTS'); 
                content.innerHTML = ""; // ОЧИЩАЄМО
                if(currentUser.requests.length === 0) {
                    content.innerHTML = `<div style='color:#21213D; text-align:center; font-weight:900; font-size:18px; margin-top:20px; text-transform:uppercase;'>НЕМАЄ ЗАПИТІВ НА ДРУЖБУ</div>`;
                } else {
                    currentUser.requests.forEach(rId => { 
                        const sender = db.users[rId]; 
                        content.innerHTML += `<div class="user-row">${getAvatarHTML(sender.nick, sender.icon, false)}<div>${sender.nick} <br><small style="color:#888;">ID: ${rId}</small></div><button class="action-btn" style="background:#28a745;" onclick="acceptFriend('${rId}')">${getText('ACCEPT')}</button></div>`; 
                    }); 
                }
            }
            else if (view === 'channels') { 
                title.innerHTML = getText('NAV_CHANNELS'); 
                content.innerHTML = ""; // ВИПРАВЛЕННЯ БАГУ ДУБЛЮВАННЯ!
                if(currentUser.channels.length === 0) content.innerHTML = `<div style='color:#888; text-align:center;'>${getText('NO_CHANS')}</div>`;
                currentUser.channels.forEach(cId => { 
                    const chan = db.channels[cId]; 
                    if(chan) content.innerHTML += `<div class="user-row">${getAvatarHTML(chan.name, chan.icon, false)}<div>${chan.name} <br><small style="color:#888;">ID: ${cId}</small></div><button class="action-btn" onclick="openChat('${cId}', 'channel')">${getText('OPEN')}</button></div>`; 
                }); 
            }
            else if (view === 'settings') {
                title.innerHTML = getText('NAV_SETTINGS');
                content.innerHTML = `
                    <div style="max-width: 500px; background: transparent; padding: 20px; border-radius: 20px; display: flex; flex-direction: column; gap: 15px;">
                        <div><label style="color:#888; font-size:14px;">${getText('S_NICK')}</label><input type="text" id="set-nick" value="${currentUser.nick}"></div>
                        <div><label style="color:#888; font-size:14px;">${getText('S_PASS')}</label><input type="password" id="set-pass" value="${currentUser.pass}"></div>
                        <div><label style="color:#888; font-size:14px;">${getText('S_UPLOAD')}</label><input type="file" id="custom-icon-upload" accept="image/*"></div>
                        <div><label style="color:#888; font-size:14px;">${getText('S_LANG')}</label>
                        <select id="set-lang">
                            ${["Arabic","Bengali","Chinese","English","French","Hindi","Japanese","Portuguese","Spanish","Ukrainian","Urdu"].map(l => `<option value="${l}" ${currentUser.lang===l?"selected":""}>${l}</option>`).join('')}
                        </select></div>
                        <div><label style="color:#888; font-size:14px;">${getText('THEME')}</label>
                        <select id="set-theme"><option value="dark" ${currentUser.theme==="dark"?"selected":""}>${getText('DARK')}</option><option value="light" ${currentUser.theme==="light"?"selected":""}>${getText('LIGHT')}</option></select></div>
                        <button class="btn" onclick="saveSettings()">${getText('SAVE')}</button>
                    </div>`;
            }
            else if (view === 'add-friends') { title.innerHTML = getText('NAV_FIND_FRIEND'); content.innerHTML = `<div style="background: transparent; padding: 20px; border-radius: 20px;"><input type="text" id="search-id" placeholder="ID"><button class="btn" onclick="sendFriendRequest()">${getText('SEND_REQ')}</button></div>`; }
            else if (view === 'create-channel') { title.innerHTML = getText('CREATE') + " (📢)"; content.innerHTML = `<div style="background: transparent; padding: 20px; border-radius: 20px;"><input type="text" id="new-chan-name" placeholder="${getText('CHAN_NAME')}"><input type="text" id="new-chan-id" placeholder="${getText('CHAN_ID')}"><button class="btn" onclick="createChannel()">${getText('CREATE')}</button></div>`; }
            else if (view === 'find-channel') { title.innerHTML = getText('NAV_FIND_CHANNEL'); content.innerHTML = `<div style="background: transparent; padding: 20px; border-radius: 20px;"><input type="text" id="find-chan-id" placeholder="${getText('CHAN_ID')}"><button class="btn" onclick="joinChannel()">${getText('JOIN')}</button></div>`; }
        }

        // --- ЛОГІКА НАЛАШТУВАНЬ ТА БОТА ---
        function saveSettings() {
            const newNick = document.getElementById('set-nick').value.trim(); const newPass = document.getElementById('set-pass').value;
            
            if(newNick && newNick !== currentUser.nick) { 
                if(db.nicks[newNick] || newNick.toLowerCase().includes("pedab") || newNick.includes("👾")) return showToast("Name Error", "red");
                delete db.nicks[currentUser.nick]; db.nicks[newNick] = currentUser.id; currentUser.nick = newNick; 
                sendBotMessage(currentUser.id, 'BOT_NAME_CHANGED'); 
            }
            if(newPass !== currentUser.pass) {
                currentUser.pass = newPass; sendBotMessage(currentUser.id, 'BOT_PASS_CHANGED'); 
            }

            currentUser.lang = document.getElementById('set-lang').value;
            currentUser.theme = document.getElementById('set-theme').value;
            
            const fileInput = document.getElementById('custom-icon-upload');
            if (fileInput.files.length > 0) { const reader = new FileReader(); reader.onload = function(e) { currentUser.icon = e.target.result; saveDB(); }; reader.readAsDataURL(fileInput.files[0]); } 
            else { saveDB(); }
        }

        // Базові функції
        function sendFriendRequest() { const targetId = document.getElementById('search-id').value.trim(); if (!targetId || targetId === currentUser.id) return; if (!db.users[targetId]) return; if (!db.users[targetId].requests) db.users[targetId].requests = []; if (!currentUser.friends) currentUser.friends = []; if (db.users[targetId].requests.includes(currentUser.id)) return; if (currentUser.friends.includes(targetId)) return; db.users[targetId].requests.push(currentUser.id); saveDB(); showToast(getText('REQ_SENT'), "green"); document.getElementById('search-id').value = ""; }
        function acceptFriend(senderId) { if (!currentUser.friends) currentUser.friends = []; if (!db.users[senderId].friends) db.users[senderId].friends = []; currentUser.friends.push(senderId); db.users[senderId].friends.push(currentUser.id); currentUser.requests = currentUser.requests.filter(id => id !== senderId); saveDB(); showToast("OK", "green"); }
        function createChannel() { const name = document.getElementById('new-chan-name').value.trim(); const id = document.getElementById('new-chan-id').value.trim(); if(!name || !id) return; if(db.channels[id]) return; db.channels[id] = { name, pass: "", icon: "", owner: currentUser.id }; currentUser.channels.push(id); saveDB(); setView('channels'); }
        function joinChannel() { const id = document.getElementById('find-chan-id').value.trim(); if(!id) return; if(!db.channels[id]) return; if(currentUser.channels.includes(id)) return; currentUser.channels.push(id); saveDB(); setView('channels'); }

        // --- ЧАТ ---
        function getChatRoomId(id1, id2) { return [id1, id2].sort().join('_'); }
        function openChat(targetId, type) { currentView = 'chat'; activeChatId = targetId; chatType = type; renderChatRoom(targetId, type); }

        function renderChatRoom(targetId, type) {
            const content = document.getElementById('main-content'); content.innerHTML = ""; let roomId, msgs;
            if (type === 'friend') {
                const friend = targetId === 'pedab_bot' ? {nick: "👾Pedab", icon: ""} : db.users[targetId];
                let callBtn = targetId === 'pedab_bot' ? "" : `<button class="icon-btn" style="margin-left:auto; width:45px; height:45px; background:#28a745;" onclick="startCall('${targetId}')">📞</button>`;
                document.getElementById('view-title').innerHTML = `<button onclick="setView('friends')" style="background:none; border:none; color:#ff3366; cursor:pointer; font-size:24px; margin-right:10px;">⬅</button> ${getAvatarHTML(targetId === 'pedab_bot' ? 'pedab_bot' : friend.nick, friend.icon, true)} ${friend.nick} ${callBtn}`;
                roomId = getChatRoomId(currentUser.id, targetId);
            } else {
                const chan = db.channels[targetId]; if (!chan) { currentUser.channels = currentUser.channels.filter(id => id !== targetId); saveDB(); setView('channels'); return; }
                document.getElementById('view-title').innerHTML = `<button onclick="setView('channels')" style="background:none; border:none; color:#ff3366; cursor:pointer; font-size:24px; margin-right:10px;">⬅</button> ${getAvatarHTML(chan.name, chan.icon, false)} ${chan.name}`;
                roomId = 'chan_' + targetId;
            }
            document.getElementById('chat-input-box').style.display = 'flex'; msgs = db.messages[roomId] || [];
            
            msgs.forEach(msg => {
                const isMe = msg.from === currentUser.id; 
                let displayContent = msg.text;
                if(msg.type === 'bot') { displayContent = getText(msg.text); } 
                else if (msg.type === 'image') displayContent = `<img src="${msg.text}" class="media-content">`; 
                else if (msg.type === 'video') displayContent = `<video src="${msg.text}" controls class="media-content"></video>`;
                
                content.innerHTML += `<div class="message-wrap ${isMe ? 'sent' : 'received'}"><div class="message">${displayContent}</div></div>`;
            });
            content.scrollTop = content.scrollHeight; 
        }

        function sendMsg() {
            if (!activeChatId) return;
            const input = document.getElementById('msg-input'); const text = input.value.trim(); if (text === "") return;
            const roomId = chatType === 'channel' ? 'chan_' + activeChatId : getChatRoomId(currentUser.id, activeChatId);
            if (!db.messages[roomId]) db.messages[roomId] = [];
            db.messages[roomId].push({ from: currentUser.id, text: text, type: 'text' });
            
            if (chatType === 'friend' && activeChatId !== 'pedab_bot') {
                fdb.ref('status/' + activeChatId).once('value', snap => {
                    if(!snap.val()) { sendBotMessage(activeChatId, `${currentUser.id}: ${text}`); }
                });
            }
            saveDB(); input.value = "";
        }
        document.getElementById('msg-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMsg(); });
        
        // Смайли та Медіа
        const emojisList = ["😀","😊","😂","🤣","🥰","😘","😅","🤩","🙄","🥳","😜","🤯","😱","🤤","😴","😇","😎","🤔","😭","😡","🤝","👏","🙌","💪","👍","👎","🙏","❤️","🔥","✨","🎉","👋","👀","🤡","💀","👽","💩","🌹","🎈","🎁","🍕","🐱","🌈","💯","✅","❌","🌟","🎵","🎮","💻","🚀"];
        function initEmojis() { document.getElementById('emoji-picker').innerHTML = emojisList.map(e => `<span onclick="addEmoji('${e}')">${e}</span>`).join(''); }
        initEmojis();
        function toggleEmojiPicker() { const p = document.getElementById('emoji-picker'); p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; }
        function addEmoji(emoji) { const i = document.getElementById('msg-input'); i.value += emoji; document.getElementById('emoji-picker').style.display = 'none'; i.focus(); }
        function handleFileUpload(event) {
            const file = event.target.files[0]; if (!file || !activeChatId) return;
            if (file.size > 500000) { showToast("Макс 0.5 МБ", "yellow"); event.target.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const roomId = chatType === 'channel' ? 'chan_' + activeChatId : getChatRoomId(currentUser.id, activeChatId);
                if (!db.messages[roomId]) db.messages[roomId] = [];
                db.messages[roomId].push({ from: currentUser.id, text: e.target.result, type: file.type.startsWith('video/') ? 'video' : 'image' });
                saveDB(); 
            }; reader.readAsDataURL(file); event.target.value = '';
        }
        
    </script>
</body>
</html>
