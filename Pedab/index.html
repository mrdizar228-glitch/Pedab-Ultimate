<html lang="en">

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif !important; font-weight: 900 !important; margin: 0; padding: 0; }
        body { background-color: #0f0f1a; color: #ffffff; height: 100vh; width: 100vw; overflow: hidden; display: flex; }

        /* --- СИСТЕМА СПОВІЩЕНЬ --- */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { padding: 15px 30px; border-radius: 12px; font-size: 16px; color: white; animation: dropDown 0.3s forwards; transition: opacity 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 1px; }
        .toast.green { background: #28a745; }
        .toast.red { background: #dc3545; }
        .toast.yellow { background: #ffc107; color: #000; }
        @keyframes dropDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- АВТОРИЗАЦІЯ --- */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .auth-box { background-color: #252545; padding: 40px; border-radius: 30px; border: 5px solid #ff3366; width: 450px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; background: #1a1a2e; border-radius: 10px; border: 2px solid transparent; }
        .auth-tab.active { border-color: #ff3366; background: #ff3366; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 3px solid #3a3a5a; background-color: #0f0f1a; color: white; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px; border: none; background-color: #ff3366; color: white; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background-color: #ff5588; transform: scale(1.02); }

        /* --- ІНТЕРФЕЙС --- */
        #app-container { display: none; width: 100%; height: 100%; position: relative; }
        .sidebar { width: 380px; background-color: #161625; border-right: 4px solid #252545; display: flex; flex-direction: column; z-index: 10; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 15px; margin: 5px 10px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: #252545; color: #ff3366; }
        .plus-btn { background: #ff3366; border: none; color: white; width: 30px; height: 30px; border-radius: 8px; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .plus-btn:hover { background: white; color: #ff3366; }

        /* АВАТАРИ */
        .avatar { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 26px; color: white; flex-shrink: 0; border: 3px solid #ffffff; object-fit: cover; }
        .friend-avatar { background-color: #8a2be2; }
        .stranger-avatar { background-color: #0000ff; }
        .error-avatar { background-color: #808080; }

        /* ОСНОВНА ЧАСТИНА */
        .main-view { flex: 1; display: flex; flex-direction: column; background-color: #0f0f1a; position: relative;}
        .view-header { padding: 20px 25px; background: #1a1a2e; border-bottom: 4px solid #252545; font-size: 24px; display: flex; align-items: center; gap: 15px; }
        .content-area { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;}
        .user-row { background: #252545; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .action-btn { padding: 10px 20px; border-radius: 10px; border: none; background: #ff3366; color: white; cursor: pointer; margin-left: auto; }

        /* ЧАТ */
        .message-wrap { display: flex; flex-direction: column; max-width: 60%; }
        .message-wrap.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrap.received { align-self: flex-start; align-items: flex-start; }
        .sender-id { font-size: 12px; color: #888; margin-bottom: 5px; margin-left: 5px; margin-right: 5px; }
        
        .message { padding: 15px; border-radius: 15px; font-size: 16px; word-wrap: break-word; }
        .message-wrap.sent .message { background-color: #ff3366; border-bottom-right-radius: 0; }
        .message-wrap.received .message { background-color: #252545; border-bottom-left-radius: 0; }
        .media-content { max-width: 100%; border-radius: 10px; max-height: 250px; }

        /* ПАНЕЛЬ ВВОДУ */
        .chat-input-area { display: none; padding: 20px; background-color: #1a1a2e; border-top: 4px solid #252545; gap: 10px; align-items: center; position: relative; }
        .chat-input-area input[type="text"] { margin: 0; flex: 1; }
        .chat-input-area .btn-send { margin: 0; width: auto; padding: 0 30px; height: 54px; }
        
        .icon-btn { width: 54px; height: 54px; border-radius: 50%; border: none; background: #252545; color: white; font-size: 24px; cursor: pointer; transition: 0.2s; flex-shrink: 0; display: flex; justify-content: center; align-items: center; }
        .icon-btn:hover { background: #3a3a5a; transform: scale(1.1); }

        .emoji-picker { display: none; position: absolute; bottom: 85px; left: 20px; background: #252545; border: 4px solid #3a3a5a; border-radius: 20px; padding: 15px; width: 280px; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; z-index: 100; }
        .emoji-picker span { font-size: 28px; cursor: pointer; transition: 0.2s; user-select: none; }
        .emoji-picker span:hover { transform: scale(1.3); }

        /* МОДАЛЬНЕ ВІКНО КАНАЛУ */
        #channel-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 15, 26, 0.9); z-index: 6000; justify-content: center; align-items: center; }

        function getText(key) {
            const lang = (currentUser && currentUser.lang) ? currentUser.lang : "English";
            return I18N[lang][key] || I18N["English"][key] || key;
        }

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = getText(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = getText(el.getAttribute('data-i18n-ph')); });
        }

        // --- СИСТЕМА СПОВІЩЕНЬ ---
        function showToast(text, type = 'green') {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.className = `toast ${type}`; toast.innerText = text; container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- БАЗА ДАНИХ ТА СИНХРОНІЗАЦІЯ ---
        let db = JSON.parse(localStorage.getItem('pedab_v10_1_db')) || { users: {}, nicks: {}, channels: {}, messages: {} };
        let currentUser = null; let authMode = 'login'; let currentView = 'friends'; let activeChatId = null; let chatType = null; 

        function saveDB() { localStorage.setItem('pedab_v10_1_db', JSON.stringify(db)); refreshUI(); }
        window.addEventListener('storage', (e) => { if (e.key === 'pedab_v10_1_db') { db = JSON.parse(e.newValue); refreshUI(); } });

        function refreshUI() {
            if (!currentUser) { applyLanguage(); return; }
            if(!db.users[currentUser.id].channels) db.users[currentUser.id].channels = [];
            if(!db.users[currentUser.id].lang) db.users[currentUser.id].lang = "English";
            
            currentUser = db.users[currentUser.id];
            applyLanguage();
            updateProfileSidebar();
            
            if (currentView === 'chat' && activeChatId) renderChatRoom(activeChatId, chatType);
            else setView(currentView);
        }

        // --- ІНІЦІАЛІЗАЦІЯ СМАЙЛІВ ---
        const emojisList = ["😀","😂","🥰","😎","🤔","😭","😡","👍","👎","❤️","🔥","✨","🎉","👋","👀","🤡","💀","👽","💩","🎮","💻","🚀"];
        function initEmojis() { document.getElementById('emoji-picker').innerHTML = emojisList.map(e => `<span onclick="addEmoji('${e}')">${e}</span>`).join(''); }
        initEmojis();
        function toggleEmojiPicker() { const p = document.getElementById('emoji-picker'); p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; }
        function addEmoji(emoji) { const i = document.getElementById('msg-input'); i.value += emoji; document.getElementById('emoji-picker').style.display = 'none'; i.focus(); }

        // --- МЕДІА (з лімітом 0.5 МБ) ---
        function handleFileUpload(event) {
            const file = event.target.files[0]; if (!file || !activeChatId) return;
            if (file.size > 500000) { showToast("Файл завеликий! Макс 0.5 МБ", "yellow"); event.target.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const roomId = chatType === 'channel' ? 'chan_' + activeChatId : getChatRoomId(currentUser.id, activeChatId);
                if (!db.messages[roomId]) db.messages[roomId] = [];
                db.messages[roomId].push({ from: currentUser.id, text: e.target.result, type: file.type.startsWith('video/') ? 'video' : 'image' });
                try { saveDB(); } catch(error) { showToast("Помилка бази даних! Файл не збережено.", "red"); }
            }; reader.readAsDataURL(file); event.target.value = '';
        }

        // --- АВТОРИЗАЦІЯ ---
        function setAuthMode(mode) {
            authMode = mode; document.getElementById('tab-login').classList.toggle('active', mode === 'login'); document.getElementById('tab-reg').classList.toggle('active', mode === 'reg'); document.getElementById('reg-fields').style.display = mode === 'reg' ? 'block' : 'none'; 
            document.getElementById('auth-btn').innerText = mode === 'reg' ? getText('REG_BTN') : getText('ENTER_BTN');
        }
        function handleAuth() {
            const nick = document.getElementById('auth-nick').value.trim(); const id = document.getElementById('auth-id').value.trim(); const pass = document.getElementById('auth-pass').value.trim();
            if (authMode === 'reg') {
                if (!nick || !id || !pass) return showToast(getText('CHAN_NAME') ? "Заповни всі поля!" : "Fill all fields!", "red");
                if (db.nicks[nick]) return showToast("Цей нік уже зайнятий!", "red");
                if (db.users[id]) return showToast("Цей ID уже існує!", "red");
                db.users[id] = { nick, pass, icon: "", friends: [], requests: [], channels: [], lang: "English" }; db.nicks[nick] = id; saveDB(); loginSuccess(id);
            } else {
                if (db.users[id] && db.users[id].pass === pass) loginSuccess(id); else showToast("Невірний ID або пароль!", "red");
            }
        }
        function loginSuccess(id) {
            currentUser = db.users[id]; currentUser.id = id;
            if(!currentUser.channels) currentUser.channels = []; if(!currentUser.lang) currentUser.lang = "English";
            document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'flex';
            applyLanguage(); updateProfileSidebar(); setView('friends');
        }
        function logout() { location.reload(); }

        function getAvatarHTML(name, iconSrc, isFriend) {
            const letter = name ? name.charAt(0).toUpperCase() : '?';
            if (iconSrc && iconSrc !== "") return `<img src="${iconSrc}" class="avatar" onerror="this.onerror=null; this.outerHTML='<div class=\\'avatar error-avatar\\'>?</div>'">`;
            return `<div class="avatar ${isFriend ? 'friend-avatar' : 'stranger-avatar'}">${letter}</div>`;
        }
        function updateProfileSidebar() {
            document.getElementById('my-nick-display').innerText = currentUser.nick; document.getElementById('my-id-display').innerText = "ID: " + currentUser.id;
            document.getElementById('my-avatar-slot').innerHTML = getAvatarHTML(currentUser.nick, currentUser.icon, true); document.getElementById('req-count').innerText = currentUser.requests.length;
        }

        // Логіка Друзів та Каналів (Базова)
        function sendFriendRequest() { const targetId = document.getElementById('search-id').value.trim(); if (!targetId || targetId === currentUser.id) return showToast("Невірний ID!", "red"); if (!db.users[targetId]) return showToast("ID не знайдено!", "red"); if (db.users[targetId].requests.includes(currentUser.id)) return; if (currentUser.friends.includes(targetId)) return; db.users[targetId].requests.push(currentUser.id); saveDB(); showToast("Запит надіслано!", "green"); document.getElementById('search-id').value = ""; }
        function acceptFriend(senderId) { currentUser.friends.push(senderId); db.users[senderId].friends.push(currentUser.id); currentUser.requests = currentUser.requests.filter(id => id !== senderId); saveDB(); showToast("Запит прийнято!", "green"); }
        function createChannel() { const name = document.getElementById('new-chan-name').value.trim(); const id = document.getElementById('new-chan-id').value.trim(); const pass = document.getElementById('new-chan-pass').value.trim(); if(!name || !id) return showToast("Введіть назву та ID!", "red"); if(db.channels[id]) return showToast("Канал з таким ID вже існує!", "red"); db.channels[id] = { name, pass, icon: "", owner: currentUser.id }; currentUser.channels.push(id); saveDB(); showToast("Канал створено!", "green"); setView('channels'); }
        function joinChannel() { const id = document.getElementById('find-chan-id').value.trim(); const pass = document.getElementById('find-chan-pass').value.trim(); if(!id) return; if(!db.channels[id]) return showToast("Канал не знайдено!", "red"); if(db.channels[id].pass !== "" && db.channels[id].pass !== pass) return showToast("Невірний пароль каналу!", "red"); if(currentUser.channels.includes(id)) return; currentUser.channels.push(id); saveDB(); showToast("Долучено!", "green"); setView('channels'); }

            const chan = db.channels[chanId]; if (!chan) return;
            const modal = document.getElementById('channel-modal');
            const content = document.getElementById('channel-modal-content');
            
            let html = `<h3 style="margin-bottom: 20px; color: white;">${getText('SETTINGS_CHAN')}</h3>`;

                html += `
                    <input type="text" id="edit-chan-name" value="${chan.name}" placeholder="${getText('CHAN_NAME')}">

                    </div>

                    <button class="btn" style="background-color: #28a745;" onclick="saveChannelSettings('${chanId}')">${getText('SAVE')}</button>

                `;
            } else {
                html += `<button class="btn" style="background-color: #ffc107; color: #000;" onclick="leaveChannel()">${getText('LEAVE_CHAN')}</button>`;
            }
            html += `<button class="btn" style="background-color: #3a3a5a; margin-top: 15px;" onclick="closeChannelOptions()">${getText('CANCEL')}</button>`;
            
            content.innerHTML = html; modal.style.display = 'flex';

        function closeChannelOptions() { document.getElementById('channel-modal').style.display = 'none'; }
        function leaveChannel() { if (!activeChatId || chatType !== 'channel') return; currentUser.channels = currentUser.channels.filter(id => id !== activeChatId); saveDB(); closeChannelOptions(); setView('channels'); }
        function deleteChannel() { if (!activeChatId || chatType !== 'channel') return; const chanId = activeChatId; for (let userId in db.users) { db.users[userId].channels = db.users[userId].channels.filter(id => id !== chanId); } delete db.messages['chan_' + chanId]; delete db.channels[chanId]; saveDB(); closeChannelOptions(); setView('channels'); }
        
        function saveChannelSettings(chanId) {
            const chan = db.channels[chanId];
            chan.name = document.getElementById('edit-chan-name').value.trim() || chan.name;
            chan.pass = document.getElementById('edit-chan-pass').value;
            const stdIcon = document.getElementById('edit-chan-icon-std').value;
            const fileInput = document.getElementById('edit-chan-icon-file');

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 500000) return showToast("Файл завеликий!", "yellow");
                const reader = new FileReader();
                reader.onload = function(e) { chan.icon = e.target.result; saveDB(); closeChannelOptions(); renderChatRoom(chanId, 'channel'); };
                reader.readAsDataURL(file);
            } else {
                if (stdIcon !== "") chan.icon = stdIcon;
                saveDB(); closeChannelOptions(); renderChatRoom(chanId, 'channel');
            }
        }

        // --- ЗБЕРЕЖЕННЯ ОСНОВНИХ НАЛАШТУВАНЬ ---
        function saveSettings() {
            const newNick = document.getElementById('set-nick').value.trim();
            if(newNick && newNick !== currentUser.nick && db.nicks[newNick]) return showToast("Цей нік уже зайнятий!", "red");
            if(newNick && newNick !== currentUser.nick) { delete db.nicks[currentUser.nick]; db.nicks[newNick] = currentUser.id; currentUser.nick = newNick; }
            currentUser.pass = document.getElementById('set-pass').value;
            currentUser.lang = document.getElementById('set-lang').value;
            
            const stdIcon = document.getElementById('set-icon').value; const fileInput = document.getElementById('custom-icon-upload');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0]; if (file.size > 500000) return showToast("Файл завеликий!", "yellow");
                const reader = new FileReader(); reader.onload = function(e) { currentUser.icon = e.target.result; finishSave(); }; reader.readAsDataURL(file);
            } else {
                if(stdIcon !== "") currentUser.icon = stdIcon; finishSave();
            }
        }
        function finishSave() {
            saveDB(); const btns = document.querySelectorAll('#main-content .btn');
            if(btns.length > 0) { const saveBtn = btns[btns.length - 1]; const oText = saveBtn.innerText; saveBtn.innerText = "✓"; saveBtn.style.backgroundColor = "#28a745"; setTimeout(() => { saveBtn.innerText = oText; saveBtn.style.backgroundColor = "#ff3366"; }, 2000); }
        }

        // --- ЧАТ ---
        function getChatRoomId(id1, id2) { return [id1, id2].sort().join('_'); }
        function openChat(targetId, type) { currentView = 'chat'; activeChatId = targetId; chatType = type; document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); renderChatRoom(targetId, type); }

        function renderChatRoom(targetId, type) {
            const content = document.getElementById('main-content'); content.innerHTML = ""; let roomId, msgs;
            if (type === 'friend') {
                const friend = db.users[targetId];
                document.getElementById('view-title').innerHTML = `<button onclick="setView('friends')" style="background:none; border:none; color:#ff3366; cursor:pointer; font-size:24px; margin-right:10px;">⬅</button> ${getAvatarHTML(friend.nick, friend.icon, true)} ${friend.nick}`;
                roomId = getChatRoomId(currentUser.id, targetId);
            } else {
                const chan = db.channels[targetId];
                if (!chan) { currentUser.channels = currentUser.channels.filter(id => id !== targetId); saveDB(); setView('channels'); return; }
                document.getElementById('view-title').innerHTML = `<button onclick="setView('channels')" style="background:none; border:none; color:#ff3366; cursor:pointer; font-size:24px; margin-right:10px;">⬅</button> ${getAvatarHTML(chan.name, chan.icon, false)} ${chan.name} <button class="icon-btn" style="margin-left:auto; width:45px; height:45px; font-size:20px;" onclick="openChannelOptions('${targetId}')">⚙️</button>`;
                roomId = 'chan_' + targetId;
            }
            document.getElementById('chat-input-box').style.display = 'flex'; msgs = db.messages[roomId] || [];
            if (msgs.length === 0) content.innerHTML = `<div style='color:#888; text-align:center; margin-top:auto; margin-bottom:auto;'>${getText('NO_MSGS')}</div>`;
            else {
                msgs.forEach(msg => {
                    const isMe = msg.from === currentUser.id; let displayContent = msg.text;
                    if (msg.type === 'image') displayContent = `<img src="${msg.text}" class="media-content">`; else if (msg.type === 'video') displayContent = `<video src="${msg.text}" controls class="media-content"></video>`;
                    let senderInfo = ""; if (type === 'channel') senderInfo = `<div class="sender-id">ID: ${msg.from}</div>`;
                    content.innerHTML += `<div class="message-wrap ${isMe ? 'sent' : 'received'}">${senderInfo}<div class="message">${displayContent}</div></div>`;
                });
            }
            content.scrollTop = content.scrollHeight; 
        }

        function sendMsg() {
            if (!activeChatId) return;
            const input = document.getElementById('msg-input'); const text = input.value.trim(); if (text === "") return;
            const roomId = chatType === 'channel' ? 'chan_' + activeChatId : getChatRoomId(currentUser.id, activeChatId);
            if (!db.messages[roomId]) db.messages[roomId] = [];
            db.messages[roomId].push({ from: currentUser.id, text: text, type: 'text' });
            saveDB(); input.value = ""; document.getElementById('emoji-picker').style.display = 'none';
        }
        document.getElementById('msg-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMsg(); });
        
        // Запуск перекладу при завантаженні (Англійська за замовчуванням)
        applyLanguage();
    </script>
</body>
</html>
