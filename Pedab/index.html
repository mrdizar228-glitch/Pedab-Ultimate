<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedab Ultimate V13.1 (Mobile Pro)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif !important; font-weight: 900 !important; margin: 0; padding: 0; }
        
        /* --- ТЕМИ (DARK/LIGHT) --- */
        body { background-color: #0f0f1a; color: #ffffff; height: 100vh; width: 100vw; overflow-x: hidden; display: flex; transition: 0.3s; }
        
        body.light-theme { background-color: #f4f4f9; color: #111; }
        body.light-theme .sidebar { background-color: #ffffff; border-right: 4px solid #ddd; color: #111; }
        body.light-theme .view-header { background-color: #eaeaea; border-bottom: 4px solid #ccc; color: #333; }
        body.light-theme .content-area { background-color: #f4f4f9; color: #111; }
        body.light-theme .user-row { background-color: #fff; border: 1px solid #ddd; color: #111; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        body.light-theme .user-row div { color: #111; }
        body.light-theme .user-row small { color: #666 !important; }
        body.light-theme .chat-input-area { background-color: #eaeaea; border-top: 4px solid #ccc; }
        body.light-theme input, body.light-theme select { background-color: #fff; color: #333; border: 2px solid #aaa; }
        body.light-theme .nav-item { color: #333; }
        body.light-theme .nav-item:hover, body.light-theme .nav-item.active { background-color: #eaeaea; color: #f29900; }
        body.light-theme .message { color: #111; }
        body.light-theme .message-wrap.received .message { background-color: #fff; border: 1px solid #ddd; }
        body.light-theme .message-wrap.sent .message { background-color: #f29900; color: white; border: none; }
        body.light-theme .auth-box { background-color: #fff; border: 5px solid #f29900; color: #111; }
        body.light-theme .auth-tab { background-color: #eaeaea; color: #333;}
        body.light-theme .auth-tab.active { background-color: #f29900; color: #fff;}
        body.light-theme #channel-modal .auth-box { background-color: #fff; }
        body.light-theme h3, body.light-theme h2, body.light-theme label { color: #111 !important; }
        body.light-theme #my-nick-display { color: #f29900 !important; }
        body.light-theme #my-id-display { color: #666 !important; }
        body.light-theme .icon-btn { background-color: #ddd; color: #111; }
        body.light-theme .icon-btn:hover { background-color: #ccc; }
        body.light-theme .emoji-picker { background-color: #fff; border-color: #ccc; }

        /* --- ЗАВАНТАЖЕННЯ --- */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f0f1a; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        body.light-theme #loading-screen { background-color: #f4f4f9; }
        .spinner { border: 8px solid #252545; border-top: 8px solid #f29900; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- СИСТЕМА СПОВІЩЕНЬ --- */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90vw; max-width: 400px; align-items: center; }
        .toast { padding: 15px 30px; border-radius: 12px; font-size: 16px; color: white; animation: dropDown 0.3s forwards; transition: opacity 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 1px; text-align: center; width: 100%; }
        .toast.green { background: #28a745; } .toast.red { background: #dc3545; } .toast.yellow { background: #f29900; color: #000; }
        @keyframes dropDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- АВТОРИЗАЦІЯ --- */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(26, 26, 46, 0.9); display: flex; justify-content: center; align-items: center; z-index: 5000; display: none; }
        .auth-box { background-color: #252545; padding: 40px; border-radius: 30px; border: 5px solid #f29900; width: 90vw; max-width: 450px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; background: #1a1a2e; border-radius: 10px; border: 2px solid transparent; transition: 0.2s; }
        .auth-tab.active { border-color: #f29900; background: #f29900; color: white; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 3px solid #3a3a5a; background-color: #0f0f1a; color: white; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px; border: none; background-color: #f29900; color: white; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background-color: #ffb84d; transform: scale(1.02); }

        /* --- ІНТЕРФЕЙС ТА АДАПТИВНІСТЬ --- */
        #app-container { display: none; width: 100%; height: 100%; position: relative; }
        .sidebar { width: 380px; background-color: #161625; border-right: 4px solid #252545; display: flex; flex-direction: column; z-index: 10000; transition: 0.3s; }
        .main-view { flex: 1; display: flex; flex-direction: column; background-color: #0f0f1a; position: relative; width: calc(100vw - 380px); }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 9999; }
        
        #mobile-menu-btn { display: none; background: transparent; border: none; font-size: 32px; color: #f29900; cursor: pointer; margin-right: 15px; padding: 0; }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 768px) {
            #mobile-menu-btn { display: block; }
            .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100vh; }
            .sidebar.open { left: 0; }
            .sidebar-overlay.show { display: block; }
            .main-view { width: 100vw; }
            
            /* Масштабування контенту */
            .content-area { padding: 15px; }
            .user-row { flex-wrap: wrap; justify-content: center; text-align: center; padding: 20px 10px; }
            .user-row > div { width: 100%; margin-top: 5px; }
            .action-btn { width: 100%; margin-left: 0; margin-top: 10px; }
            
            /* Чат */
            .message-wrap { max-width: 85%; }
            .chat-input-area { padding: 10px; gap: 5px; }
            .btn-send { padding: 0 15px; height: 50px; }
            .icon-btn { width: 50px; height: 50px; font-size: 20px; }
            .emoji-picker { width: 90vw; left: 5vw; bottom: 70px; }
            
            /* Налаштування */
            .settings-container { padding: 15px !important; }
        }

        .nav-item { padding: 15px; cursor: pointer; border-radius: 15px; margin: 5px 10px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: #252545; color: #f29900; }
        .plus-btn { background: #f29900; border: none; color: white; width: 30px; height: 30px; border-radius: 8px; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* АВАТАРИ */
        .avatar { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 26px; color: white; flex-shrink: 0; border: 3px solid #ffffff; object-fit: cover; }
        .friend-avatar { background-color: #8a2be2; } .stranger-avatar { background-color: #0000ff; } .bot-avatar { background-color: #333; }

        .view-header { padding: 15px 20px; background: #1a1a2e; border-bottom: 4px solid #252545; font-size: 22px; display: flex; align-items: center; }
        .content-area { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;}
        .user-row { background: #252545; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .action-btn { padding: 12px 20px; border-radius: 10px; border: none; background: #f29900; color: white; cursor: pointer; margin-left: auto; font-size: 14px; text-transform: uppercase;}

        /* ЧАТ */
        .message-wrap { display: flex; flex-direction: column; max-width: 60%; }
        .message-wrap.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrap.received { align-self: flex-start; align-items: flex-start; }
        .sender-id { font-size: 12px; color: #888; margin-bottom: 5px; margin-left: 5px; margin-right: 5px; }
        .message { padding: 12px 18px; border-radius: 15px; font-size: 16px; word-wrap: break-word; overflow-wrap: break-word; display: flex; align-items: center; gap: 10px;}
        .message-wrap.sent .message { background-color: #f29900; border-bottom-right-radius: 0; }
        .message-wrap.received .message { background-color: #252545; border-bottom-left-radius: 0; }
        .media-content { max-width: 100%; border-radius: 10px; max-height: 200px; }

        /* ПАНЕЛЬ ВВОДУ */
        .chat-input-area { display: none; padding: 20px; background-color: #1a1a2e; border-top: 4px solid #252545; gap: 10px; align-items: center; position: relative; }
        .chat-input-area input[type="text"] { margin: 0; flex: 1; }
        .chat-input-area .btn-send { margin: 0; width: auto; padding: 0 30px; height: 54px; }
        .icon-btn { width: 54px; height: 54px; border-radius: 50%; border: none; background: #252545; color: white; font-size: 24px; cursor: pointer; transition: 0.2s; flex-shrink: 0; display: flex; justify-content: center; align-items: center; }
        .icon-btn:hover { background: #3a3a5a; transform: scale(1.1); }
        .emoji-picker { display: none; position: absolute; bottom: 85px; left: 20px; background: #252545; border: 4px solid #3a3a5a; border-radius: 20px; padding: 15px; width: 280px; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; z-index: 100; }
        .emoji-picker span { font-size: 28px; cursor: pointer; transition: 0.2s; user-select: none; }

        /* МОДАЛЬНІ ВІКНА */
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0, 0.8); z-index: 6000; justify-content: center; align-items: center; }
        
        .trash-icon { cursor: pointer; font-size: 18px; opacity: 0.8; transition: 0.2s; margin-left: 5px; }
        .trash-icon:hover { opacity: 1; transform: scale(1.2); color: #fff; text-shadow: 0 0 5px red; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div><h2 style="color: #f29900;">Connecting to Pedab V13...</h2></div>
    <div id="toast-container"></div>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color: #f29900; margin-bottom: 20px;">PEDAB V13 MOBILE</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="setAuthMode('login')" data-i18n="LOGIN_TAB">LOGIN</div>
                <div class="auth-tab" id="tab-reg" onclick="setAuthMode('reg')" data-i18n="REG_TAB">REGISTER</div>
            </div>
            <div id="reg-fields" style="display: none;">
                <input type="text" id="auth-nick" data-i18n-ph="NICK_PH" placeholder="Create nickname">
            </div>
            <input type="text" id="auth-id" data-i18n-ph="ID_PH" placeholder="Your ID">
            <input type="password" id="auth-pass" data-i18n-ph="PASS_PH" placeholder="Password">
            <button class="btn" id="auth-btn" onclick="handleAuth()" data-i18n="ENTER_BTN">ENTER</button>
        </div>
    </div>

    <div id="channel-modal" class="modal-bg"><div class="auth-box" id="channel-modal-content" style="width: 90vw; max-width: 450px; padding: 20px;"></div></div>

    <div id="app-container">
        
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <div class="sidebar" id="main-sidebar">
            <div style="padding: 25px; border-bottom: 4px solid #252545; display: flex; align-items: center; gap: 15px;">
                <div id="my-avatar-slot"></div>
                <div style="flex:1; overflow:hidden;">
                    <div id="my-nick-display" style="font-size: 20px; color: #f29900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                    <div id="my-id-display" style="font-size: 12px; color: #888;"></div>
                </div>
                <button onclick="logout()" style="background: none; border: none; color: #f29900; cursor: pointer; font-size: 24px;">🚪</button>
            </div>
            <div style="padding-top: 10px; overflow-y:auto; flex:1;">
                <div class="nav-item active" onclick="setView('friends')"><div data-i18n="NAV_FRIENDS">👥 MY FRIENDS</div></div>
                <div class="nav-item" onclick="setView('add-friends')"><div data-i18n="NAV_FIND_FRIEND">🔍 FIND FRIEND</div></div>
                <div class="nav-item" onclick="setView('requests')"><div><span data-i18n="NAV_REQUESTS">📩 REQUESTS</span> (<span id="req-count">0</span>)</div></div>
                <hr style="border: 1px solid #252545; margin: 10px;">
                <div class="nav-item" onclick="setView('channels')"><div data-i18n="NAV_CHANNELS">📢 CHANNELS</div><button class="plus-btn" onclick="event.stopPropagation(); setView('create-channel')">+</button></div>
                <div class="nav-item" onclick="setView('find-channel')"><div data-i18n="NAV_FIND_CHANNEL">🔎 FIND CHANNEL</div></div>
                <hr style="border: 1px solid #252545; margin: 10px;">
                <div class="nav-item" onclick="setView('settings')"><div data-i18n="NAV_SETTINGS">⚙️ SETTINGS</div></div>
            </div>
        </div>

        <div class="main-view">
            <div class="view-header">
                <button id="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <div id="view-title" style="flex:1; display:flex; align-items:center;" data-i18n="CHOOSE_TAB">Select tab</div>
            </div>
            <div class="content-area" id="main-content"></div>
            
            <div class="chat-input-area" id="chat-input-box">
                <div class="emoji-picker" id="emoji-picker"></div>
                <input type="file" id="file-input" accept="image/*, video/*" style="display:none;" onchange="handleFileUpload(event)">
                <button class="icon-btn" onclick="document.getElementById('file-input').click()">+</button>
                <button class="icon-btn" onclick="toggleEmojiPicker()">😀</button>
                <input type="text" id="msg-input" data-i18n-ph="MSG_PH" placeholder="Type a message..." maxlength="15">
                <button class="btn btn-send" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDM3_nh0949pFvsmkYWs_NV4mpVdoezUsQ",
            authDomain: "pedab-ultimate-4c325.firebaseapp.com",
            databaseURL: "https://pedab-ultimate-4c325-default-rtdb.firebaseio.com",
            projectId: "pedab-ultimate-4c325",
            storageBucket: "pedab-ultimate-4c325.firebasestorage.app",
            messagingSenderId: "446805006463",
            appId: "1:446805006463:web:9d81e96a245235a128874a"
        };
        firebase.initializeApp(firebaseConfig);
        const fdb = firebase.database();

        // --- МОБІЛЬНЕ МЕНЮ ---
        function toggleSidebar() {
            document.getElementById('main-sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('show');
        }
        function closeSidebar() {
            if(window.innerWidth <= 768) {
                document.getElementById('main-sidebar').classList.remove('open');
                document.getElementById('sidebar-overlay').classList.remove('show');
            }
        }

        // --- МУЛЬТИМОВНИЙ СЛОВНИК ---
        const I18N = {
            "English": { LOGIN_TAB: "LOGIN", REG_TAB: "REGISTER", NICK_PH: "Nickname", ID_PH: "Your ID", PASS_PH: "Password", ENTER_BTN: "ENTER", REG_BTN: "REGISTER", NAV_FRIENDS: "👥 MY FRIENDS", NAV_FIND_FRIEND: "🔍 FIND FRIEND", NAV_REQUESTS: "📩 REQUESTS", NAV_CHANNELS: "📢 CHANNELS", NAV_FIND_CHANNEL: "🔎 FIND CHANNEL", NAV_SETTINGS: "⚙️ SETTINGS", CHOOSE_TAB: "Select tab", MSG_PH: "Message (max 15)...", SEND_REQ: "SEND REQUEST", ACCEPT: "ACCEPT", WRITE: "MESSAGE", OPEN: "OPEN", CREATE: "CREATE", JOIN: "JOIN", SAVE: "SAVE SETTINGS", BOT_PASS_CHANGED: "Password changed.", BOT_NAME_CHANGED: "Nickname updated.", THEME: "THEME", LIGHT: "Light", DARK: "Dark", S_LANG: "LANGUAGE", S_NICK: "NICKNAME", S_PASS: "CHANGE PASSWORD", S_UPLOAD: "UPLOAD CUSTOM ICON", CHAN_NAME: "Channel Name", CHAN_ID: "Channel ID", NO_CHANS: "No channels.", ERROR_RES: "Reserved!" },
            "Ukrainian": { LOGIN_TAB: "ВХІД", REG_TAB: "РЕЄСТРАЦІЯ", NICK_PH: "Нікнейм", ID_PH: "Твій ID", PASS_PH: "Пароль", ENTER_BTN: "УВІЙТИ", REG_BTN: "ЗАРЕЄСТРУВАТИ", NAV_FRIENDS: "👥 МОЇ ДРУЗІ", NAV_FIND_FRIEND: "🔍 ЗНАЙТИ ДРУГА", NAV_REQUESTS: "📩 ЗАПИТИ", NAV_CHANNELS: "📢 КАНАЛИ", NAV_FIND_CHANNEL: "🔎 ЗНАЙТИ КАНАЛ", NAV_SETTINGS: "⚙️ НАЛАШТУВАННЯ", CHOOSE_TAB: "Оберіть вкладку", MSG_PH: "Смс (макс 15)...", SEND_REQ: "НАДІСЛАТИ", ACCEPT: "ПРИЙНЯТИ", WRITE: "НАПИСАТИ", OPEN: "ВІДКРИТИ", CREATE: "СТВОРИТИ", JOIN: "ДОЛУЧИТИСЯ", SAVE: "ЗБЕРЕГТИ", BOT_PASS_CHANGED: "Пароль змінено.", BOT_NAME_CHANGED: "Ім'я оновлено.", THEME: "ТЕМА", LIGHT: "Світла", DARK: "Темна", S_LANG: "МОВА", S_NICK: "НІКНЕЙМ", S_PASS: "ЗМІНИТИ ПАРОЛЬ", S_UPLOAD: "ЗАВАНТАЖИТИ ІКОНКУ", CHAN_NAME: "Назва каналу", CHAN_ID: "ID каналу", NO_CHANS: "Ти ще не додав каналів.", ERROR_RES: "Зарезервовано!" },
            // Додай сюди інші 9 мов за бажанням!
        };

        function getText(key) {
            const lang = (currentUser && currentUser.lang) ? currentUser.lang : "English";
            return I18N[lang] && I18N[lang][key] ? I18N[lang][key] : (I18N["English"][key] || key);
        }

        function applyLanguageAndTheme() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = getText(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = getText(el.getAttribute('data-i18n-ph')); });
            if (currentUser && currentUser.theme === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
        }

        function showToast(text, type = 'green') {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.className = `toast ${type}`; toast.innerText = text; container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- БАЗА ДАНИХ ---
        let db = { users: {}, nicks: {}, channels: {}, messages: {} };
        let currentUser = null; let authMode = 'login'; let currentView = 'friends'; let activeChatId = null; let chatType = null; 
        let isDbLoaded = false;

        fdb.ref('pedab_global_db').on('value', (snapshot) => {
            if (snapshot.val()) {
                db = snapshot.val();
                if(!db.users) db.users = {}; if(!db.nicks) db.nicks = {}; if(!db.channels) db.channels = {}; if(!db.messages) db.messages = {};
            }
            if (!isDbLoaded) {
                isDbLoaded = true; document.getElementById('loading-screen').style.display = 'none';
                if (!currentUser) document.getElementById('auth-screen').style.display = 'flex';
            }
            refreshUI();
        });

        function saveDB() { fdb.ref('pedab_global_db').set(db); }

        function refreshUI() {
            if (!currentUser) { applyLanguageAndTheme(); return; }
            if(!db.users[currentUser.id]) return; 
            
            if(!db.users[currentUser.id].channels) db.users[currentUser.id].channels = [];
            if(!db.users[currentUser.id].friends) db.users[currentUser.id].friends = [];
            if(!db.users[currentUser.id].requests) db.users[currentUser.id].requests = [];
            if(!db.users[currentUser.id].lang) db.users[currentUser.id].lang = "English";
            if(!db.users[currentUser.id].theme) db.users[currentUser.id].theme = "dark";
            
            currentUser = db.users[currentUser.id];
            applyLanguageAndTheme(); updateProfileSidebar();
            
            if (currentView === 'chat' && activeChatId) renderChatRoom(activeChatId, chatType);
            else setView(currentView);
        }

        function setOnlineStatus() {
            const presenceRef = fdb.ref('status/' + currentUser.id);
            fdb.ref('.info/connected').on('value', snap => {
                if(snap.val() === true) { presenceRef.onDisconnect().set(false); presenceRef.set(true); }
            });
        }

        function sendBotMessage(targetId, textKeyOrRaw) {
            let roomId = getChatRoomId(targetId, 'pedab_bot');
            if(!db.messages[roomId]) db.messages[roomId] = [];
            db.messages[roomId].push({from: 'pedab_bot', text: textKeyOrRaw, type: 'bot'});
            saveDB();
        }

        // --- АВТОРИЗАЦІЯ ---
        function setAuthMode(mode) {
            authMode = mode; document.getElementById('tab-login').classList.toggle('active', mode === 'login'); document.getElementById('tab-reg').classList.toggle('active', mode === 'reg'); document.getElementById('reg-fields').style.display = mode === 'reg' ? 'block' : 'none'; 
            document.getElementById('auth-btn').innerText = mode === 'reg' ? getText('REG_BTN') : getText('ENTER_BTN');
        }

        function handleAuth() {
            const nick = document.getElementById('auth-nick').value.trim(); const id = document.getElementById('auth-id').value.trim(); const pass = document.getElementById('auth-pass').value.trim();
            const lowerNick = nick.toLowerCase(); const lowerId = id.toLowerCase();
            
            if (lowerNick.includes("pedab") || lowerId.includes("pedab") || lowerNick.includes("👾") || lowerId.includes("👾")) {
                return showToast(getText('ERROR_RES'), "red");
            }

            if (authMode === 'reg') {
                if (!nick || !id || !pass) return showToast("Error", "red");
                if (db.nicks[nick]) return showToast("Error", "red");
                if (db.users[id]) return showToast("Error", "red");
                db.users[id] = { nick, pass, icon: "", friends: [], requests: [], channels: [], lang: "English", theme: "dark" }; 
                db.nicks[nick] = id; saveDB(); loginSuccess(id);
            } else {
                if (db.users[id] && db.users[id].pass === pass) loginSuccess(id); else showToast("Error", "red");
            }
        }

        function loginSuccess(id) {
            currentUser = db.users[id]; currentUser.id = id;
            if(!currentUser.channels) currentUser.channels = []; if(!currentUser.lang) currentUser.lang = "English";
            if(!currentUser.friends) currentUser.friends = []; if(!currentUser.requests) currentUser.requests = [];
            if(!currentUser.theme) currentUser.theme = "dark";
            
            document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'flex';
            setOnlineStatus(); applyLanguageAndTheme(); updateProfileSidebar(); setView('friends');
        }
        function logout() { location.reload(); }

        function getAvatarHTML(name, iconSrc, isFriend) {
            if(name === "pedab_bot") return `<div class="avatar bot-avatar">👾</div>`;
            const letter = name ? name.charAt(0).toUpperCase() : '?';
            if (iconSrc && iconSrc !== "") return `<img src="${iconSrc}" class="avatar" onerror="this.onerror=null; this.outerHTML='<div class=\\'avatar error-avatar\\'>?</div>'">`;
            return `<div class="avatar ${isFriend ? 'friend-avatar' : 'stranger-avatar'}">${letter}</div>`;
        }
        function updateProfileSidebar() {
            document.getElementById('my-nick-display').innerText = currentUser.nick; document.getElementById('my-id-display').innerText = "ID: " + currentUser.id;
            document.getElementById('my-avatar-slot').innerHTML = getAvatarHTML(currentUser.nick, currentUser.icon, true); document.getElementById('req-count').innerText = currentUser.requests.length;
        }

        // --- ЛОГІКА ВКЛАДОК ---
        function setView(view) {
            currentView = view; activeChatId = null; chatType = null;
            const content = document.getElementById('main-content'); const title = document.getElementById('view-title');
            document.getElementById('chat-input-box').style.display = 'none'; document.getElementById('emoji-picker').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            closeSidebar();

            if (view === 'friends') {
                title.innerHTML = getText('NAV_FRIENDS');
                content.innerHTML = `<div class="user-row">${getAvatarHTML('pedab_bot', '', false)}<div style="flex:1;">👾Pedab System Bot <br><small style="color:#888;">ID: pedab_bot</small></div><button class="action-btn" onclick="openChat('pedab_bot', 'friend')">${getText('WRITE')}</button></div>`;
                currentUser.friends.forEach(fId => { const friend = db.users[fId]; content.innerHTML += `<div class="user-row">${getAvatarHTML(friend.nick, friend.icon, true)}<div style="flex:1;">${friend.nick} <br><small style="color:#888;">ID: ${fId}</small></div><button class="action-btn" onclick="openChat('${fId}', 'friend')">${getText('WRITE')}</button></div>`; });
            } 
            else if (view === 'requests') { 
                title.innerHTML = getText('NAV_REQUESTS'); 
                content.innerHTML = ""; 
                if(currentUser.requests.length === 0) {
                    content.innerHTML = `<div style='color:#21213D; text-align:center; font-weight:900; font-size:18px; margin-top:20px; text-transform:uppercase;'>НЕМАЄ ЗАПИТІВ НА ДРУЖБУ</div>`;
                } else {
                    currentUser.requests.forEach(rId => { 
                        const sender = db.users[rId]; 
                        content.innerHTML += `<div class="user-row">${getAvatarHTML(sender.nick, sender.icon, false)}<div style="flex:1;">${sender.nick} <br><small style="color:#888;">ID: ${rId}</small></div><button class="action-btn" style="background:#28a745;" onclick="acceptFriend('${rId}')">${getText('ACCEPT')}</button></div>`; 
                    }); 
                }
            }
            else if (view === 'channels') { 
                title.innerHTML = getText('NAV_CHANNELS'); 
                content.innerHTML = ""; 
                if(currentUser.channels.length === 0) content.innerHTML = `<div style='color:#888; text-align:center;'>${getText('NO_CHANS')}</div>`;
                currentUser.channels.forEach(cId => { 
                    const chan = db.channels[cId]; 
                    if(chan) content.innerHTML += `<div class="user-row">${getAvatarHTML(chan.name, chan.icon, false)}<div style="flex:1;">${chan.name} <br><small style="color:#888;">ID: ${cId}</small></div><button class="action-btn" onclick="openChat('${cId}', 'channel')">${getText('OPEN')}</button></div>`; 
                }); 
            }
            else if (view === 'settings') {
                title.innerHTML = getText('NAV_SETTINGS');
                content.innerHTML = `
                    <div class="settings-container" style="max-width: 100%; width: 100%; background: transparent; padding: 0px; border-radius: 20px; display: flex; flex-direction: column; gap: 15px;">
                        <div><label style="color:#888; font-size:14px;">${getText('S_NICK')}</label><input type="text" id="set-nick" value="${currentUser.nick}"></div>
                        <div><label style="color:#888; font-size:14px;">${getText('S_PASS')}</label><input type="password" id="set-pass" value="${currentUser.pass}"></div>
                        <div><label style="color:#888; font-size:14px;">${getText('S_UPLOAD')}</label><input type="file" id="custom-icon-upload" accept="image/*"></div>
                        <div><label style="color:#888; font-size:14px;">${getText('S_LANG')}</label>
                        <select id="set-lang">
                            <option value="English" ${currentUser.lang==="English"?"selected":""}>English</option>
                            <option value="Ukrainian" ${currentUser.lang==="Ukrainian"?"selected":""}>Ukrainian</option>
                        </select></div>
                        <div><label style="color:#888; font-size:14px;">${getText('THEME')}</label>
                        <select id="set-theme"><option value="dark" ${currentUser.theme==="dark"?"selected":""}>${getText('DARK')}</option><option value="light" ${currentUser.theme==="light"?"selected":""}>${getText('LIGHT')}</option></select></div>
                        <button class="btn" style="margin-top: 5px;" onclick="saveSettings()">${getText('SAVE')}</button>
                    </div>`;
            }
            else if (view === 'add-friends') { title.innerHTML = getText('NAV_FIND_FRIEND'); content.innerHTML = `<div style="background: transparent; padding: 0px;"><input type="text" id="search-id" placeholder="ID"><button class="btn" style="margin-top:5px;" onclick="sendFriendRequest()">${getText('SEND_REQ')}</button></div>`; }
            else if (view === 'create-channel') { title.innerHTML = getText('CREATE') + " (📢)"; content.innerHTML = `<div style="background: transparent; padding: 0px;"><input type="text" id="new-chan-name" placeholder="${getText('CHAN_NAME')}"><input type="text" id="new-chan-id" placeholder="${getText('CHAN_ID')}"><button class="btn" style="margin-top:5px;" onclick="createChannel()">${getText('CREATE')}</button></div>`; }
            else if (view === 'find-channel') { title.innerHTML = getText('NAV_FIND_CHANNEL'); content.innerHTML = `<div style="background: transparent; padding: 0px;"><input type="text" id="find-chan-id" placeholder="${getText('CHAN_ID')}"><button class="btn" style="margin-top:5px;" onclick="joinChannel()">${getText('JOIN')}</button></div>`; }
        }

        // --- ЛОГІКА НАЛАШТУВАНЬ ТА БОТА ---
        function saveSettings() {
            const newNick = document.getElementById('set-nick').value.trim(); const newPass = document.getElementById('set-pass').value;
            
            if(newNick && newNick !== currentUser.nick) { 
                if(db.nicks[newNick] || newNick.toLowerCase().includes("pedab") || newNick.includes("👾")) return showToast("Name Error", "red");
                delete db.nicks[currentUser.nick]; db.nicks[newNick] = currentUser.id; currentUser.nick = newNick; 
                sendBotMessage(currentUser.id, 'BOT_NAME_CHANGED'); 
            }
            if(newPass !== currentUser.pass) {
                currentUser.pass = newPass; sendBotMessage(currentUser.id, 'BOT_PASS_CHANGED'); 
            }

            currentUser.lang = document.getElementById('set-lang').value;
            currentUser.theme = document.getElementById('set-theme').value;
            
            const fileInput = document.getElementById('custom-icon-upload');
            if (fileInput.files.length > 0) { const reader = new FileReader(); reader.onload = function(e) { currentUser.icon = e.target.result; saveDB(); }; reader.readAsDataURL(fileInput.files[0]); } 
            else { saveDB(); }
        }

        function sendFriendRequest() { const targetId = document.getElementById('search-id').value.trim(); if (!targetId || targetId === currentUser.id) return; if (!db.users[targetId]) return; if (!db.users[targetId].requests) db.users[targetId].requests = []; if (!currentUser.friends) currentUser.friends = []; if (db.users[targetId].requests.includes(currentUser.id)) return; if (currentUser.friends.includes(targetId)) return; db.users[targetId].requests.push(currentUser.id); saveDB(); showToast(getText('REQ_SENT'), "green"); document.getElementById('search-id').value = ""; }
        function acceptFriend(senderId) { if (!currentUser.friends) currentUser.friends = []; if (!db.users[senderId].friends) db.users[senderId].friends = []; currentUser.friends.push(senderId); db.users[senderId].friends.push(currentUser.id); currentUser.requests = currentUser.requests.filter(id => id !== senderId); saveDB(); showToast("OK", "green"); }
        function createChannel() { const name = document.getElementById('new-chan-name').value.trim(); const id = document.getElementById('new-chan-id').value.trim(); if(!name || !id) return; if(db.channels[id]) return; db.channels[id] = { name, pass: "", icon: "", owner: currentUser.id }; currentUser.channels.push(id); saveDB(); setView('channels'); }
        function joinChannel() { const id = document.getElementById('find-chan-id').value.trim(); if(!id) return; if(!db.channels[id]) return; if(currentUser.channels.includes(id)) return; currentUser.channels.push(id); saveDB(); setView('channels'); }

        // --- ЧАТ ТА ВИДАЛЕННЯ СМС ---
        function getChatRoomId(id1, id2) { return [id1, id2].sort().join('_'); }
        function openChat(targetId, type) { 
            currentView = 'chat'; activeChatId = targetId; chatType = type; 
            closeSidebar();
            renderChatRoom(targetId, type); 
        }

        function deleteMsg(roomId, index) {
            db.messages[roomId].splice(index, 1);
            saveDB();
        }

        function renderChatRoom(targetId, type) {
            const content = document.getElementById('main-content'); content.innerHTML = ""; let roomId, msgs;
            if (type === 'friend') {
                const friend = targetId === 'pedab_bot' ? {nick: "👾Pedab", icon: ""} : db.users[targetId];
                document.getElementById('view-title').innerHTML = `<button onclick="setView('friends')" style="background:none; border:none; color:#f29900; cursor:pointer; font-size:24px; margin-right:10px;">⬅</button> <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${friend.nick}</span>`;
                roomId = getChatRoomId(currentUser.id, targetId);
            } else {
                const chan = db.channels[targetId]; if (!chan) { currentUser.channels = currentUser.channels.filter(id => id !== targetId); saveDB(); setView('channels'); return; }
                document.getElementById('view-title').innerHTML = `<button onclick="setView('channels')" style="background:none; border:none; color:#f29900; cursor:pointer; font-size:24px; margin-right:10px;">⬅</button> <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${chan.name}</span>`;
                roomId = 'chan_' + targetId;
            }
            document.getElementById('chat-input-box').style.display = 'flex'; msgs = db.messages[roomId] || [];
            
            msgs.forEach((msg, index) => {
                const isMe = msg.from === currentUser.id; 
                let displayContent = msg.text;
                if(msg.type === 'bot') { displayContent = getText(msg.text); } 
                else if (msg.type === 'image') displayContent = `<img src="${msg.text}" class="media-content">`; 
                else if (msg.type === 'video') displayContent = `<video src="${msg.text}" controls class="media-content"></video>`;
                
                let trashBtn = isMe ? `<span class="trash-icon" onclick="deleteMsg('${roomId}', ${index})">🗑️</span>` : "";
                
                content.innerHTML += `<div class="message-wrap ${isMe ? 'sent' : 'received'}"><div class="message">${displayContent} ${trashBtn}</div></div>`;
            });
            content.scrollTop = content.scrollHeight; 
        }

        function sendMsg() {
            if (!activeChatId) return;
            const input = document.getElementById('msg-input'); const text = input.value.trim(); 
            if (text === "") return;
            if (text.length > 15) return showToast("Макс 15 символів!", "yellow");

            const roomId = chatType === 'channel' ? 'chan_' + activeChatId : getChatRoomId(currentUser.id, activeChatId);
            if (!db.messages[roomId]) db.messages[roomId] = [];
            db.messages[roomId].push({ from: currentUser.id, text: text, type: 'text' });
            
            if (chatType === 'friend' && activeChatId !== 'pedab_bot') {
                fdb.ref('status/' + activeChatId).once('value', snap => {
                    if(!snap.val()) { sendBotMessage(activeChatId, `${currentUser.id}: ${text}`); }
                });
            }
            saveDB(); input.value = "";
        }
        document.getElementById('msg-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMsg(); });
        
        // НОВІ СМАЙЛИ ТА МЕДІА
        const emojisList = ["😀","😊","😂","🤣","🥰","😘","😅","🤩","🙄","🥳","😜","🤯","😱","🤤","😴","😇","😎","🤔","😭","😡","🤝","👏","🙌","💪","👍","👎","🙏","❤️","🔥","✨","🎉","👋","👀","🤡","💀","👽","💩","🌹","🎈","🎁","🍕","🐱","🌈","💯","✅","❌","🌟","🎵","🎮","💻","🚀"];
        function initEmojis() { document.getElementById('emoji-picker').innerHTML = emojisList.map(e => `<span onclick="addEmoji('${e}')">${e}</span>`).join(''); }
        initEmojis();
        function toggleEmojiPicker() { const p = document.getElementById('emoji-picker'); p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; }
        function addEmoji(emoji) { const i = document.getElementById('msg-input'); if(i.value.length < 15) { i.value += emoji; } document.getElementById('emoji-picker').style.display = 'none'; i.focus(); }
        function handleFileUpload(event) {
            const file = event.target.files[0]; if (!file || !activeChatId) return;
            if (file.size > 500000) { showToast("Макс 0.5 МБ", "yellow"); event.target.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const roomId = chatType === 'channel' ? 'chan_' + activeChatId : getChatRoomId(currentUser.id, activeChatId);
                if (!db.messages[roomId]) db.messages[roomId] = [];
                db.messages[roomId].push({ from: currentUser.id, text: e.target.result, type: file.type.startsWith('video/') ? 'video' : 'image' });
                saveDB(); 
            }; reader.readAsDataURL(file); event.target.value = '';
        }
        
    </script>
</body>
</html>
